name: Android Studio Build APK

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      file_name:
        description: 'Project File Name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Project
        run: |
          unzip ${{ github.event.inputs.file_name }}
          chmod +x gradlew

      # Proses Build untuk Android Studio
      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Send APK to Telegram
        run: |
          # Mencari file APK secara otomatis di folder build
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          curl -v -F "chat_id=${{ github.event.inputs.chat_id }}" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ *Build Android Studio Berhasil!*" \
               https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
               
